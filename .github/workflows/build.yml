name: 构建单文件安装器

# 触发条件：
#   - 推送 main 分支：构建并上传 Artifacts（供预览/测试用）
#   - 推送 v*.*.* 标签：构建 + 创建 GitHub Release（正式发布）
#   - 手动触发：workflow_dispatch（可在 Actions 页面一键触发）
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  build:
    name: 构建单文件安装器
    runs-on: windows-latest

    permissions:
      contents: write  # 创建 Release 所需

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────────────────────────────
      - name: 检出代码
        uses: actions/checkout@v4

      # ── 2. 运行构建脚本 ───────────────────────────────────────────────────────
      - name: 构建单文件脚本
        shell: pwsh
        run: pwsh -File installer/build/Build-SingleFile.ps1

      # ── 3. 输出产物 SHA256（便于用户校验完整性）──────────────────────────────
      - name: 计算产物校验和
        shell: pwsh
        run: |
          $files = Get-ChildItem "installer/build/dist/*.built.ps1"
          foreach ($f in $files) {
            $hash = (Get-FileHash $f.FullName -Algorithm SHA256).Hash
            Write-Host "SHA256($($f.Name)) = $hash"
          }

      # ── 4. 上传 Artifacts（每次推送都保留，便于下载测试）────────────────────
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: claude-code-installer
          path: installer/build/dist/*.built.ps1
          retention-days: 30

      # ── 5. 创建 GitHub Release（仅 v*.*.* 标签触发）──────────────────────────
      - name: 创建 GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/build/dist/*.built.ps1
          generate_release_notes: true
          body: |
            ## 🚀 快速安装

            打开 **PowerShell**（任意版本，无需管理员），粘贴以下命令：

            ```powershell
            Set-ExecutionPolicy Bypass -Scope Process -Force
            irm 'https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Bootstrap-ClaudeEnv.built.ps1' | iex
            ```

            > **说明**：Bootstrap 脚本会自动安装 PowerShell 7 等前置依赖，完成后再引导运行主安装脚本。

            ---

            ## 📋 分步安装

            **步骤 1**（在旧版 PowerShell / Git Bash 中运行）：
            ```powershell
            # 安装前置依赖（PS7、Windows Terminal 等）
            Set-ExecutionPolicy Bypass -Scope Process -Force
            irm 'https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Bootstrap-ClaudeEnv.built.ps1' | iex
            ```

            **步骤 2**（在 PowerShell 7 中运行）：
            ```powershell
            # 安装 Claude Code 开发环境
            Set-ExecutionPolicy Bypass -Scope Process -Force
            irm 'https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Install-ClaudeEnv.built.ps1' | iex
            ```

            ---

            ## 📦 文件说明

            | 文件 | PS 版本要求 | 用途 |
            |------|------------|------|
            | `Bootstrap-ClaudeEnv.built.ps1` | 5.1+ | 安装前置依赖（首先运行）|
            | `Install-ClaudeEnv.built.ps1` | 7.0+ | 安装 Claude Code 开发环境 |
